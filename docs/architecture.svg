<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <style>
      text { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }
      .label { font-size: 12px; fill: #e2e8f0; }
      .title { font-size: 13px; fill: #f8fafc; font-weight: bold; }
      .sub { font-size: 10px; fill: #94a3b8; }
      .code { font-size: 10px; fill: #7dd3fc; }
      .highlight { font-size: 11px; fill: #fbbf24; }
      .arrow { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-blue { stroke: #3b82f6; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-blue); }
      .arrow-purple { stroke: #8b5cf6; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-purple); }
      .arrow-green { stroke: #10b981; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-green); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="boxBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#1e2d4a"/>
    </linearGradient>
    <linearGradient id="boxPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b5e"/>
      <stop offset="100%" style="stop-color:#1f1245"/>
    </linearGradient>
    <linearGradient id="boxGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="100%" style="stop-color:#022c22"/>
    </linearGradient>
    <linearGradient id="boxAmber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#451a03"/>
      <stop offset="100%" style="stop-color:#2d1200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bgGrad)" rx="12"/>
  <rect width="900" height="520" fill="none" stroke="#334155" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="15" fill="#f8fafc" font-weight="bold" font-family="'SF Mono','Fira Code',monospace">fireworks-skill-memory — Architecture Overview</text>
  <line x1="60" y1="46" x2="840" y2="46" stroke="#334155" stroke-width="1"/>

  <!-- ===== LEFT SIDE: INJECTION FLOW ===== -->
  <!-- Section label -->
  <text x="215" y="72" text-anchor="middle" font-size="11" fill="#3b82f6" font-family="'SF Mono','Fira Code',monospace">① SKILL INVOCATION (real-time)</text>

  <!-- User box -->
  <rect x="60" y="82" width="140" height="44" rx="6" fill="url(#boxBlue)" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="130" y="100" text-anchor="middle" class="title">User</text>
  <text x="130" y="116" text-anchor="middle" class="sub">invokes a skill</text>

  <!-- Arrow down -->
  <line x1="130" y1="126" x2="130" y2="156" class="arrow-blue"/>

  <!-- Claude reads SKILL.md -->
  <rect x="60" y="156" width="140" height="44" rx="6" fill="url(#boxBlue)" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="130" y="174" text-anchor="middle" class="title">Claude</text>
  <text x="130" y="190" text-anchor="middle" class="code">reads SKILL.md</text>

  <!-- Arrow right to hook -->
  <line x1="200" y1="178" x2="256" y2="178" class="arrow-blue"/>
  <text x="228" y="170" text-anchor="middle" class="sub">triggers</text>

  <!-- PostToolUse Hook box -->
  <rect x="256" y="156" width="148" height="44" rx="6" fill="url(#boxPurple)" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="330" y="172" text-anchor="middle" class="title" fill="#c4b5fd">PostToolUse Hook</text>
  <text x="330" y="188" text-anchor="middle" class="code">inject-skill-knowledge.py</text>

  <!-- Arrow down from hook -->
  <line x1="330" y1="200" x2="330" y2="230" class="arrow-purple"/>

  <!-- KNOWLEDGE.md read -->
  <rect x="256" y="230" width="148" height="44" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="330" y="248" text-anchor="middle" class="title" fill="#94a3b8">KNOWLEDGE.md</text>
  <text x="330" y="264" text-anchor="middle" class="sub">~/.claude/skills/{name}/</text>

  <!-- Arrow left back to Claude -->
  <line x1="256" y1="252" x2="200" y2="220" class="arrow-blue"/>
  <text x="222" y="244" text-anchor="middle" class="sub" fill="#fbbf24">additionalContext</text>

  <!-- Claude responds -->
  <rect x="60" y="290" width="140" height="44" rx="6" fill="url(#boxGreen)" stroke="#10b981" stroke-width="1.2"/>
  <text x="130" y="308" text-anchor="middle" class="title" fill="#6ee7b7">Claude responds</text>
  <text x="130" y="324" text-anchor="middle" class="sub">with past lessons</text>
  <line x1="130" y1="234" x2="130" y2="290" class="arrow-green"/>

  <!-- ===== DIVIDER ===== -->
  <line x1="450" y1="55" x2="450" y2="490" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ===== RIGHT SIDE: DISTILLATION FLOW ===== -->
  <text x="675" y="72" text-anchor="middle" font-size="11" fill="#10b981" font-family="'SF Mono','Fira Code',monospace">② SESSION DISTILLATION (async)</text>

  <!-- Session ends -->
  <rect x="600" y="82" width="140" height="44" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.2"/>
  <text x="670" y="100" text-anchor="middle" class="title">Session ends</text>
  <text x="670" y="116" text-anchor="middle" class="sub">user closes window</text>

  <!-- Arrow down -->
  <line x1="670" y1="126" x2="670" y2="156" class="arrow"/>

  <!-- Stop Hook -->
  <rect x="600" y="156" width="140" height="44" rx="6" fill="url(#boxPurple)" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="670" y="172" text-anchor="middle" class="title" fill="#c4b5fd">Stop Hook</text>
  <text x="670" y="188" text-anchor="middle" class="code">async: true</text>

  <!-- Arrow down -->
  <line x1="670" y1="200" x2="670" y2="230" class="arrow-purple"/>

  <!-- Script box -->
  <rect x="582" y="230" width="176" height="60" rx="6" fill="url(#boxPurple)" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="670" y="250" text-anchor="middle" class="title" fill="#c4b5fd">update-skills-knowledge.py</text>
  <text x="670" y="265" text-anchor="middle" class="sub">reads transcript (last 300 lines)</text>
  <text x="670" y="279" text-anchor="middle" class="sub">detects skill usage</text>

  <!-- Arrow down -->
  <line x1="670" y1="290" x2="670" y2="318" class="arrow-purple"/>

  <!-- Haiku model -->
  <rect x="600" y="318" width="140" height="44" rx="6" fill="url(#boxAmber)" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="670" y="336" text-anchor="middle" class="title" fill="#fcd34d">claude-haiku-4-5</text>
  <text x="670" y="352" text-anchor="middle" class="sub">extracts 1-3 lessons</text>

  <!-- Arrow down -->
  <line x1="670" y1="362" x2="670" y2="390" class="arrow-green"/>

  <!-- KNOWLEDGE.md write -->
  <rect x="582" y="390" width="176" height="44" rx="6" fill="url(#boxGreen)" stroke="#10b981" stroke-width="1.2"/>
  <text x="670" y="408" text-anchor="middle" class="title" fill="#6ee7b7">KNOWLEDGE.md updated</text>
  <text x="670" y="424" text-anchor="middle" class="sub">deduplicated · capped at 30 entries</text>

  <!-- ===== BOTTOM: KNOWLEDGE STRUCTURE ===== -->
  <rect x="60" y="390" width="420" height="100" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="80" y="410" class="code">~/.claude/</text>
  <text x="80" y="428" class="code" fill="#94a3b8">├── skills-knowledge.md</text>
  <text x="80" y="428" dx="190" class="sub">← global principles (≤ 20)</text>
  <text x="80" y="446" class="code" fill="#94a3b8">└── skills/</text>
  <text x="80" y="464" class="code" fill="#7dd3fc">    ├── browser-use/KNOWLEDGE.md</text>
  <text x="80" y="464" dx="240" class="sub">← per-skill (≤ 30)</text>
  <text x="80" y="480" class="code" fill="#7dd3fc">    └── {any-skill}/KNOWLEDGE.md</text>
  <text x="80" y="480" dx="240" class="sub">← auto-created</text>

  <!-- Connect bottom to flows -->
  <line x1="330" y1="274" x2="330" y2="390" class="arrow-green" stroke-dasharray="4,3"/>
  <line x1="670" y1="434" x2="490" y2="445" class="arrow-green" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <rect x="60" y="345" width="380" height="36" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="74" y="357" width="10" height="10" rx="2" fill="#3b82f6"/>
  <text x="90" y="366" class="sub" fill="#93c5fd">Injection path</text>
  <rect x="164" y="357" width="10" height="10" rx="2" fill="#8b5cf6"/>
  <text x="180" y="366" class="sub" fill="#c4b5fd">Hook trigger</text>
  <rect x="254" y="357" width="10" height="10" rx="2" fill="#10b981"/>
  <text x="270" y="366" class="sub" fill="#6ee7b7">Distillation path</text>
  <rect x="358" y="357" width="10" height="10" rx="2" fill="#f59e0b"/>
  <text x="374" y="366" class="sub" fill="#fcd34d">LLM call</text>
</svg>
